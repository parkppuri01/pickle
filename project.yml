name: PicKle
options:
  bundleIdPrefix: com.Team-jAm
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "7"
    # Manual + Developer ID gives a STABLE code signature so macOS TCC remembers
    # granted permissions (Screen Recording, etc.) across rebuilds. Ad-hoc dev
    # signatures change every build → the grant never sticks (infinite re-prompt).
    # The team ID + identity live in Signing.xcconfig (gitignored) — see
    # Signing.xcconfig.example. Referenced via the target's configFiles below.
    CODE_SIGN_STYLE: Manual
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  PicKle:
    type: application
    platform: macOS
    sources:
      - path: PicKle
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.Team-jAm.PICkle
        PRODUCT_NAME: PICkle
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PicKle/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: PicKle/PicKle.entitlements
    dependencies:
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle
schemes:
  PicKle:
    build:
      targets:
        PicKle: all
    run:
      config: Debug
